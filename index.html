<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinematic Landing</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Oswald', sans-serif;
      overflow-x: hidden;
    }.container {
  width: 90%;
  margin: auto;
  padding: 40px 0;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0;
  font-size: 14px;
  opacity: 0.7;
}

.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.hero h1 {
  font-size: 12vw;
  font-weight: 700;
  letter-spacing: 5px;
  position: absolute;
  text-transform: uppercase;
  z-index: 2;
  mix-blend-mode: difference;
}

.hero img {
  width: 400px;
  z-index: 1;
  transform: scale(0.9);
  transition: transform 1s ease;
}

.hero:hover img {
  transform: scale(1);
}

.section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  opacity: 0;
  transform: translateY(50px);
  transition: all 1s ease;
}

.section.visible {
  opacity: 1;
  transform: translateY(0);
}

.horizontal {
  display: flex;
  gap: 40px;
  padding: 100px 0;
  overflow-x: auto;
}

.card {
  min-width: 300px;
  height: 400px;
  background: #111;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  transition: transform 0.4s ease;
}

.card:hover {
  transform: scale(1.05);
}

.cursor {
  width: 20px;
  height: 20px;
  border: 2px solid #fff;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: transform 0.1s ease;
  z-index: 999;
}

  </style>
</head>
<body><div class="cursor" id="cursor"></div><div class="container">
  <header>
    <div>Brand</div>
    <div>Menu</div>
  </header>
</div><section class="hero">
  <h1>Virox</h1>
  <img src="https://via.placeholder.com/400" alt="visual" />
</section><section class="section">Cinematic Experience</section><section class="horizontal">
  <div class="card">01</div>
  <div class="card">02</div>
  <div class="card">03</div>
  <div class="card">04</div>
</section><section class="section">Scroll Animation</section><script>
  const sections = document.querySelectorAll('.section');

  window.addEventListener('scroll', () => {
    sections.forEach(sec => {
      const rect = sec.getBoundingClientRect();
      if (rect.top < window.innerHeight - 100) {
        sec.classList.add('visible');
      }
    });
  });

  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
</script></body>
</html>
